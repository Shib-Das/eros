[package]
name = "eros"
version = "0.1.0"
edition = "2021"

[lib]
name = "eros"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "eros"
path = "src/cli/main.rs"
required-features = ["cli"]


[features]
default = ["cli"]
cli = ["clap", "tokio", "tokio-stream", "indicatif", "futures-batch"]

cuda = ["ort/cuda"]
tensorrt = ["ort/tensorrt"]
coreml = ["ort/coreml"]
indicatif = ["dep:indicatif"]

[dependencies]
hf-hub = "0.4.1"
ort = { version = "=2.0.0-rc.10" }
anyhow = "1.0.95"
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "fmt"] }
image = "0.25.5"
serde = "1.0.217"
serde_json = "1.0.138"
ndarray = { version = "0.16", features = ["rayon"] }
csv = "1.3.1"
itertools = "0.14.0"
indexmap = "2.7.1"
futures = "0.3.31"

clap = { version = "4.5.28", features = ["derive"], optional = true }
tokio = { version = "1.43.0", features = ["full"], optional = true }
tokio-stream = { version = "0.1.17", optional = true }
indicatif = { version = "0.18.0", optional = true, features = ["futures"] }
futures-batch = { version = "0.7.0", optional = true }

[dev-dependencies]
rand = "0.9.2"

[profile.release]
lto = true
